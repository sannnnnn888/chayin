<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养生茶饮 · 品鉴数据看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #3D2B1A;
            min-height: 100vh;
            background: #F5EDE0;
            overflow-x: hidden;
        }
        .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .bg-layer .texture {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,90,43,0.015) 2px, rgba(139,90,43,0.015) 4px);
        }
        .bg-layer .gradient {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 90% 60% at 15% 20%, rgba(255,180,100,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 70% 50% at 85% 75%, rgba(180,120,80,0.06) 0%, transparent 60%);
        }
        .container { max-width: 840px; margin: 0 auto; position: relative; z-index: 1; padding: 20px 20px 40px; }

        /* Header */
        .header-wrap {
            position: relative; margin-bottom: 20px; border-radius: 28px; overflow: hidden;
            background: linear-gradient(145deg, #8B3A1A, #6B2A10); padding: 2px;
        }
        .header-inner {
            border-radius: 27px; background: linear-gradient(160deg, #FFF8F0, #FFF0E0);
            padding: 28px 24px 20px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .header-inner::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle 120px at 85% 20%, rgba(255,200,100,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-left { position: relative; z-index: 1; }
        .header-left .company { font-size: 13px; font-weight: 700; color: #4A2A10; letter-spacing: 2px; }
        .header-left h1 { font-size: 22px; font-weight: 800; color: #5A2E0E; letter-spacing: 3px; }
        .header-left h1 span { color: #C26A2A; }
        .header-right { position: relative; z-index: 1; display: flex; gap: 8px; }
        .btn-sm {
            padding: 10px 18px;
            border-radius: 20px;
            border: 1.5px solid rgba(139,58,26,0.2);
            background: rgba(255,255,255,0.8);
            color: #4A2A10;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-sm:hover { background: #FFF; border-color: #C26A2A; }
        .btn-sm.primary { background: linear-gradient(145deg, #C26A2A, #A85A1E); color: #FFF; border-color: transparent; }
        .btn-sm.primary:hover { box-shadow: 0 4px 12px rgba(194,106,42,0.3); }
        .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 18px 16px;
            border: 1px solid rgba(200,170,140,0.2);
            box-shadow: 0 3px 16px rgba(100,60,30,0.05);
            text-align: center;
        }
        .summary-card .label { font-size: 11px; color: #B8A898; letter-spacing: 2px; margin-bottom: 6px; }
        .summary-card .value { font-size: 32px; font-weight: 800; color: #3D2B1A; line-height: 1; }
        .summary-card .value.small { font-size: 24px; }
        .top3-list { font-size: 13px; line-height: 1.8; text-align: center; }
        .top3-list .t3-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .top3-list .t3-medal { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
        .top3-list .t3-name { font-weight: 600; color: #4A2A10; }
        .top3-list .t3-score { font-weight: 700; color: #C26A2A; min-width: 32px; text-align: right; }

        /* Tea Breakdown */
        .section-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(200,170,140,0.25);
            box-shadow: 0 4px 20px rgba(100,60,30,0.06);
            position: relative; overflow: hidden;
        }
        .section-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #C26A2A, #E8A87A, #C26A2A); opacity: 0.3;
        }
        .section-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
        }
        .section-header h2 { font-size: 17px; font-weight: 700; color: #3D2B1A; letter-spacing: 1px; }

        .tea-row {
            padding: 16px 0;
            border-bottom: 1px solid rgba(200,170,140,0.08);
        }
        .tea-row:last-child { border-bottom: none; }
        .tea-row-top {
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
        }
        .tea-badge {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(145deg, #C26A2A, #A85A1E);
            color: #FFF;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px;
            flex-shrink: 0;
        }
        .tea-info { flex: 1; min-width: 120px; }
        .tea-info .tea-name { font-weight: 700; font-size: 15px; color: #4A2A10; }
        .tea-info .tea-count { font-size: 11px; color: #B8A898; }
        .tea-scores {
            display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }
        .tea-score-item { text-align: center; }
        .tea-score-item .dim { font-size: 10px; color: #B8A898; letter-spacing: 1px; }
        .tea-score-item .val { font-size: 20px; font-weight: 700; color: #3D2B1A; }
        .tea-bar-wrap {
            margin-top: 8px;
            display: flex; align-items: center; gap: 10px;
        }
        .tea-bar {
            flex: 1; height: 8px;
            background: rgba(200,170,140,0.12);
            border-radius: 4px; overflow: hidden;
        }
        .tea-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #C26A2A, #E8A87A);
            border-radius: 4px; transition: width 0.8s ease;
        }
        .tea-bar-val { font-size: 14px; font-weight: 700; color: #5A2E0E; min-width: 36px; }
        .tea-suggestions {
            margin-top: 6px; font-size: 11px; color: #A08060; line-height: 1.6;
        }
        .tea-suggestions em { font-style: normal; background: rgba(194,106,42,0.06); padding: 1px 6px; border-radius: 4px; margin: 0 2px; }

        /* Raw Data Table */
        .table-wrap { overflow-x: auto; }
        .table-wrap table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .table-wrap th {
            background: rgba(245,237,224,0.6);
            padding: 10px 12px; text-align: left;
            font-weight: 600; color: #4A3520; font-size: 11px; letter-spacing: 1px;
            border-bottom: 2px solid rgba(200,170,140,0.15);
            white-space: nowrap;
        }
        .table-wrap td {
            padding: 8px 12px; border-bottom: 1px solid rgba(200,170,140,0.06);
            color: #4A3520; white-space: nowrap;
        }
        .table-wrap tr:hover td { background: rgba(245,237,224,0.3); }
        .table-wrap .sg { color: #A08060; font-size: 12px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }

        .toggle-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            background: none; border: 1px solid rgba(200,170,140,0.2);
            border-radius: 16px; font-family: inherit; font-size: 12px;
            color: #A08060; cursor: pointer; letter-spacing: 1px;
            transition: all 0.2s; margin-top: 12px;
        }
        .toggle-btn:hover { border-color: #C26A2A; color: #5A2E0E; }

        .empty-state { text-align: center; padding: 60px 20px; color: #C8B8A8; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
        .refresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .refresh-row .updated { font-size: 11px; color: #C8B8A8; }

        @media (max-width: 700px) {
            .container { padding: 12px 12px 30px; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .summary-card { padding: 14px 12px; }
            .summary-card .value { font-size: 24px; }
            .section-card { padding: 16px 14px; border-radius: 18px; }
            .header-inner { padding: 22px 16px 18px; }
            .header-left h1 { font-size: 18px; }
            .tea-scores { gap: 10px; }
            .tea-score-item .val { font-size: 16px; }
        }

        @media print {
            .bg-layer, .btn-sm, .header-right, .toggle-btn, .refresh-row { display: none !important; }
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .section-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
            .summary-card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="gradient"></div>
        <div class="texture"></div>
    </div>

    <div class="container">

        <!-- Header -->
        <div class="header-wrap">
            <div class="header-inner">
                <div class="header-left">
                    <div class="company">广意医疗养生科技有限公司</div>
                    <h1>养生茶饮 · <span>品鉴数据看板</span></h1>
                </div>
                <div class="header-right">
                    <button class="btn-sm" onclick="exportCSV()">📥 Excel</button>
                    <button class="btn-sm" onclick="exportPDF()">🖨️ PDF</button>
                    <button class="btn-sm primary" onclick="loadData()">🔄 刷新</button>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">提交次数</div>
                <div class="value" id="sum-sessions">--</div>
            </div>
            <div class="summary-card">
                <div class="label">总评价条数</div>
                <div class="value" id="sum-total">--</div>
            </div>
            <div class="summary-card">
                <div class="label">整体均分</div>
                <div class="value" id="sum-avg">--</div>
            </div>
            <div class="summary-card">
                <div class="label">最受好评茶饮</div>
                <div class="value top3-list" id="sum-top">--</div>
            </div>
        </div>

        <!-- Tea Breakdown -->
        <div class="section-card">
            <div class="refresh-row">
                <div class="section-header" style="margin-bottom:0"><h2>🍵 各款茶饮评分明细</h2></div>
                <span class="updated" id="updatedAt"></span>
            </div>
            <div id="teaBreakdown">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无数据</p>
                </div>
            </div>
        </div>

        <!-- Raw Data -->
        <div class="section-card">
            <div class="section-header"><h2>📋 原始数据</h2></div>
            <div id="rawData">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无数据</p>
                </div>
            </div>
            <button class="toggle-btn" id="toggleRaw" style="display:none" onclick="toggleRaw()">展开全部数据</button>
        </div>

    </div>

    <script>
        const SB_URL = 'https://ihtlypzusfsgpieeomhi.supabase.co';
        const SB_KEY = 'sb_publishable_6Tu-LDqldC7AJMAjC0TXVQ_5gQql6Eu';
        const SB_TABLE = 'tea_surveys';
        const teaEmojis = ['🍵','🌿','🌸','🍊','🍋','🫐','🍑','🍯','🌹'];

        let allData = [];

        async function loadData() {
            try {
                const resp = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?select=*&order=created_at.desc&limit=500`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
                });
                if (!resp.ok) throw new Error('Failed to load');
                allData = await resp.json();
                renderAll();
                document.getElementById('updatedAt').textContent =
                    '更新于 ' + new Date().toLocaleTimeString('zh-CN');
            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('updatedAt').textContent = '加载失败';
            }
        }

        function renderAll() {
            if (!allData || allData.length === 0) {
                document.getElementById('teaBreakdown').innerHTML =
                    '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                document.getElementById('rawData').innerHTML =
                    '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                return;
            }
            renderSummary();
            renderTeaBreakdown();
            renderRawTable();
        }

        function renderSummary() {
            const sessions = new Set(allData.map(r => r.session_id)).size;
            const total = allData.length;
            const avgAll = allData.reduce((s, r) => s + (r.concept + r.taste + r.satisfaction) / 3, 0) / total;

            // Top 3 by average score (concept + taste + satisfaction) / 3
            const teaScores = {};
            allData.forEach(r => {
                if (!teaScores[r.tea_id]) teaScores[r.tea_id] = [];
                teaScores[r.tea_id].push((r.concept + r.taste + r.satisfaction) / 3);
            });
            const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
            const ranked = Object.entries(teaScores)
                .map(([id, scores]) => ({ id: parseInt(id), avg: avg(scores), count: scores.length }))
                .sort((a, b) => b.avg - a.avg)
                .slice(0, 3);

            const medals = ['🥇', '🥈', '🥉'];
            let topHtml = '--';
            if (ranked.length > 0) {
                topHtml = ranked.map((t, i) =>
                    `<div class="t3-row"><span class="t3-medal">${medals[i]}</span><span class="t3-name">${teaEmojis[t.id-1]} ${t.id}号</span><span class="t3-score">${t.avg.toFixed(1)}</span></div>`
                ).join('');
            }

            document.getElementById('sum-sessions').textContent = sessions;
            document.getElementById('sum-total').textContent = total;
            document.getElementById('sum-avg').textContent = avgAll.toFixed(1);
            document.getElementById('sum-top').innerHTML = topHtml;
        }

        function renderTeaBreakdown() {
            const teaStats = {};
            for (let i = 1; i <= 9; i++) {
                teaStats[i] = {
                    concept: [], taste: [], satisfaction: [], suggestions: [], count: 0
                };
            }
            allData.forEach(r => {
                const s = teaStats[r.tea_id];
                s.concept.push(r.concept);
                s.taste.push(r.taste);
                s.satisfaction.push(r.satisfaction);
                if (r.suggestion) s.suggestions.push(r.suggestion);
                s.count++;
            });

            const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

            let html = '';
            for (let i = 1; i <= 9; i++) {
                const s = teaStats[i];
                if (s.count === 0) {
                    html += `<div class="tea-row">
                        <div class="tea-row-top">
                            <div class="tea-badge" style="background:#D4C8BC">${i}</div>
                            <div class="tea-info">
                                <div class="tea-name">${teaEmojis[i-1]} ${i}号茶</div>
                                <div class="tea-count">暂无评价</div>
                            </div>
                        </div>
                    </div>`;
                    continue;
                }
                const cAvg = avg(s.concept), tAvg = avg(s.taste), sAvg = avg(s.satisfaction);
                const overall = (cAvg + tAvg + sAvg) / 3;
                const pct = Math.round(overall * 10);

                const recentSgs = s.suggestions.slice(-3);
                const sgHtml = recentSgs.length > 0
                    ? '💬 ' + recentSgs.map(sg => `<em>"${sg}"</em>`).join(' ')
                    : '';

                html += `<div class="tea-row">
                    <div class="tea-row-top">
                        <div class="tea-badge">${i}</div>
                        <div class="tea-info">
                            <div class="tea-name">${teaEmojis[i-1]} ${i}号茶</div>
                            <div class="tea-count">${s.count} 次评价</div>
                        </div>
                        <div class="tea-scores">
                            <div class="tea-score-item"><div class="dim">观感</div><div class="val">${cAvg.toFixed(1)}</div></div>
                            <div class="tea-score-item"><div class="dim">口感</div><div class="val">${tAvg.toFixed(1)}</div></div>
                            <div class="tea-score-item"><div class="dim">推荐值</div><div class="val">${sAvg.toFixed(1)}</div></div>
                        </div>
                    </div>
                    <div class="tea-bar-wrap">
                        <div class="tea-bar"><div class="fill" style="width:${pct}%"></div></div>
                        <div class="tea-bar-val">${overall.toFixed(1)}</div>
                    </div>
                    ${sgHtml ? `<div class="tea-suggestions">${sgHtml}</div>` : ''}
                </div>`;
            }

            document.getElementById('teaBreakdown').innerHTML = html;
        }

        function renderRawTable() {
            const recent = allData.slice(0, 30);
            let html = `<div class="table-wrap"><table>
                <thead><tr>
                    <th>时间</th><th>会话ID</th><th>茶款</th>
                    <th>观感</th><th>口感</th><th>推荐值</th><th>建议</th>
                </tr></thead><tbody>`;
            recent.forEach(r => {
                const t = new Date(r.created_at).toLocaleString('zh-CN');
                html += `<tr>
                    <td>${t}</td>
                    <td>${(r.session_id || '').slice(0, 8)}...</td>
                    <td>${teaEmojis[r.tea_id - 1]} ${r.tea_id}号</td>
                    <td>${r.concept}</td><td>${r.taste}</td><td>${r.satisfaction}</td>
                    <td class="sg">${r.suggestion || ''}</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            if (allData.length > 30) {
                html += `<p style="text-align:center;font-size:12px;color:#C8B8A8;margin-top:8px;">
                    显示最近30条，共${allData.length}条。导出Excel获取全部数据。</p>`;
            }
            document.getElementById('rawData').innerHTML = html;
            document.getElementById('toggleRaw').style.display = allData.length > 0 ? 'inline-flex' : 'none';
        }

        function toggleRaw() {
            const el = document.getElementById('rawData');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // ===== Export: Excel (CSV) =====
        function exportCSV() {
            if (allData.length === 0) { alert('暂无数据可导出'); return; }
            const header = '时间,茶款,观感,口感,满意推荐值,建议';
            const rows = allData.map(r => {
                const t = new Date(r.created_at).toLocaleString('zh-CN');
                const sg = (r.suggestion || '').replace(/"/g, '""');
                return `${t},${r.tea_id}号,${r.concept},${r.taste},${r.satisfaction},"${sg}"`;
            });
            const csv = '\uFEFF' + header + '\n' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `茶饮品鉴数据_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ===== Export: PDF (print) =====
        function exportPDF() { window.print(); }

        // Auto-load
        loadData();
    </script>
</body>
</html>
