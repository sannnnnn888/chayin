<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>夏日消暑神器 · 人气饮品大调查</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  background:linear-gradient(135deg,#E8F4F8 0%,#D4EDDA 100%);
  min-height:100vh;
  color:#1a2a3a;
  overflow-x:hidden;
  position:relative;
  padding-bottom:100px;
}

/* ===== DECORATIVE PARTICLES ===== */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  animation:float linear infinite;
  will-change:transform;
}
.particle:nth-child(1){width:14px;height:14px;left:5%;top:10%;animation-duration:22s;animation-delay:0s;background:rgba(255,255,255,0.35)}
.particle:nth-child(2){width:8px;height:8px;left:15%;top:30%;animation-duration:18s;animation-delay:2s;background:rgba(255,255,255,0.45)}
.particle:nth-child(3){width:20px;height:20px;left:25%;top:60%;animation-duration:26s;animation-delay:1s;background:rgba(255,255,255,0.25)}
.particle:nth-child(4){width:6px;height:6px;left:40%;top:15%;animation-duration:15s;animation-delay:3s;background:rgba(255,255,255,0.55)}
.particle:nth-child(5){width:16px;height:16px;left:55%;top:45%;animation-duration:24s;animation-delay:0.5s;background:rgba(255,255,255,0.3)}
.particle:nth-child(6){width:10px;height:10px;left:70%;top:20%;animation-duration:19s;animation-delay:4s;background:rgba(255,255,255,0.4)}
.particle:nth-child(7){width:12px;height:12px;left:82%;top:55%;animation-duration:21s;animation-delay:1.5s;background:rgba(255,255,255,0.35)}
.particle:nth-child(8){width:7px;height:7px;left:90%;top:75%;animation-duration:17s;animation-delay:2.5s;background:rgba(255,255,255,0.5)}
.particle:nth-child(9){width:18px;height:18px;left:35%;top:80%;animation-duration:28s;animation-delay:0s;background:rgba(255,255,255,0.2)}
.particle:nth-child(10){width:9px;height:9px;left:60%;top:90%;animation-duration:16s;animation-delay:3.5s;background:rgba(255,255,255,0.45)}
.particle:nth-child(11){width:22px;height:22px;left:10%;top:50%;animation-duration:30s;animation-delay:1s;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3)}
.particle:nth-child(12){width:5px;height:5px;left:75%;top:5%;animation-duration:13s;animation-delay:0s;background:rgba(255,255,255,0.6)}

/* ===== DECORATIVE ICE CRYSTAL ===== */
.ice-crystal{
  position:fixed;
  pointer-events:none;
  z-index:0;
  opacity:0.12;
  animation:spin slow linear infinite;
}
.ice-crystal::before,.ice-crystal::after{
  content:'';
  position:absolute;
  background:currentColor;
}
.ice-crystal-1{
  top:-20px;right:10%;
  width:60px;height:60px;
  color:#4A90B8;
  animation-duration:45s;
}
.ice-crystal-1::before{
  top:50%;left:0;right:0;height:2px;
  transform:translateY(-50%);
}
.ice-crystal-1::after{
  left:50%;top:0;bottom:0;width:2px;
  transform:translateX(-50%);
}
.ice-crystal-2{
  bottom:40px;left:5%;
  width:40px;height:40px;
  color:#7BC4A8;
  animation-duration:35s;
  animation-direction:reverse;
}
.ice-crystal-2::before{
  top:50%;left:0;right:0;height:1.5px;
  transform:translateY(-50%) rotate(45deg);
}
.ice-crystal-2::after{
  left:50%;top:0;bottom:0;width:1.5px;
  transform:translateX(-50%) rotate(45deg);
}

/* ===== NAV ===== */
.nav{
  position:relative;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  max-width:1200px;
  margin:0 auto;
}
.nav-logo{
  font-size:0.875rem;
  font-weight:600;
  color:#4A90B8;
  letter-spacing:0.03em;
}
.nav-logo span{color:#7BC4A8}
.nav-admin{
  font-size:0.75rem;
  color:#9BB5C7;
  text-decoration:none;
  transition:color 0.2s;
  letter-spacing:0.05em;
}
.nav-admin:hover{color:#4A90B8}

/* ===== HERO ===== */
.hero{
  position:relative;
  z-index:1;
  text-align:center;
  padding:48px 20px 40px;
  max-width:700px;
  margin:0 auto;
}
.hero h1{
  font-size:clamp(2.2rem,6vw,3.6rem);
  font-weight:800;
  letter-spacing:-0.02em;
  line-height:1.15;
  background:linear-gradient(135deg,#4A90B8 0%,#7BC4A8 50%,#F5A623 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
.hero-subtitle{
  font-size:clamp(1rem,2.5vw,1.2rem);
  color:#6B8A9E;
  font-weight:400;
  letter-spacing:0.08em;
  margin-bottom:32px;
}

/* ===== REMAINING VOTES INDICATOR ===== */
.votes-indicator{
  display:inline-flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.4);
  border-radius:100px;
  padding:10px 24px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.votes-indicator-label{
  font-size:0.85rem;
  color:#6B8A9E;
  font-weight:500;
}
.votes-indicator-number{
  font-size:1.6rem;
  font-weight:800;
  color:#F5A623;
  line-height:1;
  min-width:28px;
  text-align:center;
  transition:transform 0.15s ease;
}
.votes-indicator-number.pop{animation:popNumber 0.3s ease}
.votes-indicator-total{
  font-size:0.85rem;
  color:#9BB5C7;
  font-weight:500;
}

/* ===== GRID ===== */
.grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 16px 24px;
  max-width:1200px;
  margin:0 auto;
}

/* ===== CARD ===== */
.card{
  position:relative;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
  padding:16px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform 0.25s cubic-bezier(0.16,1,0.3,1),box-shadow 0.25s ease,border-color 0.25s ease;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.1);
}
.card:active{
  transform:translateY(-1px) scale(0.98);
}
.card-voted{
  border-color:#4A90B8;
  box-shadow:0 8px 32px rgba(74,144,184,0.15),0 0 0 1.5px rgba(74,144,184,0.2);
}
.card-voted:hover{
  box-shadow:0 12px 40px rgba(74,144,184,0.2),0 0 0 1.5px rgba(74,144,184,0.25);
}
.card-disabled{
  opacity:0.45;
  cursor:default;
  filter:grayscale(0.3);
}
.card-disabled:hover{
  transform:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
}
.card-disabled:active{transform:none}
.card-emoji{
  font-size:clamp(2rem,5vw,2.8rem);
  display:block;
  margin-bottom:6px;
  line-height:1.2;
  transition:transform 0.2s ease;
}
.card-voted .card-emoji{animation:emojiPop 0.35s ease}
.card-name{
  font-size:clamp(0.78rem,2vw,0.88rem);
  font-weight:600;
  color:#1a2a3a;
  line-height:1.3;
  word-break:break-word;
}
.card-vote-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:8px;
  background:linear-gradient(135deg,#F5A623,#F5A623dd);
  color:#fff;
  font-size:0.75rem;
  font-weight:700;
  padding:3px 10px;
  border-radius:100px;
  opacity:0;
  transform:scale(0.8);
  transition:opacity 0.2s ease,transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.card-vote-badge.visible{
  opacity:1;
  transform:scale(1);
}
.card-vote-badge-number{
  min-width:10px;
  text-align:center;
}
.card-minus{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.4);
  color:#fff;
  font-size:0.85rem;
  font-weight:700;
  cursor:pointer;
  transition:background 0.2s ease,transform 0.15s ease;
  line-height:1;
  padding:0;
}
.card-minus:hover{
  background:rgba(231,76,60,0.8);
  transform:scale(1.15);
}
.card-minus:active{transform:scale(0.9)}

/* vote pulse animation on the badge number */
@keyframes popNumber{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
@keyframes emojiPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.2)}
  70%{transform:scale(0.95)}
  100%{transform:scale(1)}
}

/* ===== SUBMIT AREA ===== */
.submit-area{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:20;
  padding:16px 20px;
  background:linear-gradient(to top,rgba(232,244,248,0.95) 60%,transparent);
  text-align:center;
  pointer-events:none;
}
.submit-area button{
  pointer-events:auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  max-width:400px;
  padding:16px 32px;
  border:none;
  border-radius:16px;
  font-size:1.05rem;
  font-weight:700;
  font-family:inherit;
  color:#fff;
  background:linear-gradient(135deg,#4A90B8,#7BC4A8);
  box-shadow:0 8px 24px rgba(74,144,184,0.3);
  cursor:pointer;
  transition:opacity 0.3s ease,transform 0.2s ease,box-shadow 0.3s ease;
  letter-spacing:0.04em;
}
.submit-area button:not(:disabled):hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(74,144,184,0.4);
}
.submit-area button:not(:disabled):active{
  transform:translateY(0) scale(0.98);
}
.submit-area button:disabled{
  opacity:0.35;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}
.submit-area button.submitting{
  opacity:0.6;
  cursor:wait;
}

/* ===== SUCCESS OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}
.overlay-content{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:24px;
  padding:48px 40px 40px;
  max-width:400px;
  width:90%;
  text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,0.15);
  border:1px solid rgba(255,255,255,0.3);
  transform:translateY(20px) scale(0.95);
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.overlay.active .overlay-content{
  transform:translateY(0) scale(1);
}
.overlay-icon{
  width:72px;
  height:72px;
  border-radius:50%;
  background:linear-gradient(135deg,#7BC4A8,#4A90B8);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  font-size:2rem;
  color:#fff;
  font-weight:700;
  box-shadow:0 8px 24px rgba(74,144,184,0.25);
}
.overlay h2{
  font-size:1.6rem;
  font-weight:800;
  color:#1a2a3a;
  margin-bottom:8px;
}
.overlay p{
  font-size:0.95rem;
  color:#6B8A9E;
  line-height:1.6;
  margin-bottom:24px;
}
.overlay-btn{
  display:inline-block;
  padding:12px 32px;
  border-radius:12px;
  background:linear-gradient(135deg,#4A90B8,#7BC4A8);
  color:#fff;
  border:none;
  font-size:0.95rem;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
  text-decoration:none;
}
.overlay-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(74,144,184,0.3);
}
.overlay-summary{
  font-size:0.82rem;
  color:#9BB5C7;
  margin-top:12px;
}

/* ===== ERROR TOAST ===== */
.toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  z-index:50;
  background:rgba(231,76,60,0.95);
  backdrop-filter:blur(8px);
  color:#fff;
  padding:12px 24px;
  border-radius:12px;
  font-size:0.88rem;
  font-weight:600;
  box-shadow:0 8px 24px rgba(231,76,60,0.3);
  opacity:0;
  transition:transform 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.35s ease;
  pointer-events:none;
  white-space:nowrap;
}
.toast.active{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}

/* ===== RESPONSIVE ===== */
@media(min-width:540px){
  .grid{gap:16px;padding:0 24px 32px}
  .card{padding:20px 16px}
}
@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);gap:18px;padding:0 32px 40px}
  .card{padding:24px 16px}
  .hero{padding:64px 20px 48px}
  .nav{padding:20px 32px}
}
@media(min-width:1024px){
  .grid{grid-template-columns:repeat(4,1fr);gap:20px;padding:0 40px 48px}
}
@media(min-width:1280px){
  .grid{grid-template-columns:repeat(5,1fr);gap:20px;padding:0 40px 48px}
}
@media(max-width:380px){
  .grid{gap:8px;padding:0 8px 20px}
  .card{padding:12px 8px}
  .card-emoji{font-size:1.6rem}
  .card-name{font-size:0.7rem}
}

/* ===== KEYFRAMES ===== */
@keyframes float{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100vh) translateX(40px) rotate(180deg);opacity:0}
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
</style>
</head>
<body>

<!-- Decorative elements -->
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>
<div class="ice-crystal ice-crystal-1" aria-hidden="true"></div>
<div class="ice-crystal ice-crystal-2" aria-hidden="true"></div>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo"><span>🧊</span> 夏日顶流</div>
  <a href="dashboard.html" class="nav-admin">管理员入口</a>
</nav>

<!-- Hero -->
<header class="hero">
  <h1>谁是夏日顶流？</h1>
  <p class="hero-subtitle">Pick你最心水的消暑神器</p>
  <div class="votes-indicator">
    <span class="votes-indicator-label">剩余票数</span>
    <span class="votes-indicator-number" id="remainingVotes">3</span>
    <span class="votes-indicator-total">/ 3</span>
  </div>
</header>

<!-- Beverage Grid -->
<main class="grid" id="beverageGrid"></main>

<!-- Submit -->
<div class="submit-area">
  <button id="submitBtn" disabled>提交投票</button>
</div>

<!-- Success Overlay -->
<div class="overlay" id="successOverlay">
  <div class="overlay-content">
    <div class="overlay-icon">&#10003;</div>
    <h2>投票成功！</h2>
    <p>感谢你的参与，让我们一起度过清凉一夏！</p>
    <button class="overlay-btn" onclick="closeOverlay()">我知道了</button>
  </div>
</div>

<!-- Error Toast -->
<div class="toast" id="errorToast">提交失败，请检查网络后重试</div>

<script>
const BEVERAGES = [
  {id:1, name:"翡翠橄榄油柑", emoji:"🫒"},
  {id:2, name:"陈皮紫苏", emoji:"🌿"},
  {id:3, name:"陈皮酸梅汤", emoji:"🫙"},
  {id:4, name:"丝绒红豆乳", emoji:"🫘"},
  {id:5, name:"芋见抹茶", emoji:"🍵"},
  {id:6, name:"罗汉清火茶", emoji:"🍃"},
  {id:7, name:"元气熬夜水（养肝茶）", emoji:"✨"},
  {id:8, name:"皮皮闹乌龙（陈皮秋梨乌龙冻）", emoji:"🍐"},
  {id:9, name:"茅根竹蔗水", emoji:"🎋"},
  {id:10, name:"茉莉奶绿", emoji:"🌸"},
  {id:11, name:"斑斓椰椰冻", emoji:"🥥"},
  {id:12, name:"秋梨润椰冻", emoji:"🍐"},
  {id:13, name:"海石花椰冻", emoji:"🌊"},
  {id:14, name:"芒果厚椰乳", emoji:"🥭"},
  {id:15, name:"轻盈草本茶（祛湿茶）", emoji:"🌱"},
  {id:16, name:"珍珠奶茶", emoji:"🧋"},
  {id:17, name:"香芋椰奶西米露", emoji:"🟣"},
  {id:18, name:"暴打柠檬茶", emoji:"🍋"},
  {id:19, name:"桃胶美人羹", emoji:"🌸"},
  {id:20, name:"杨枝甘露", emoji:"🥤"},
  {id:21, name:"仙草椰椰冻", emoji:"🖤"},
  {id:22, name:"杏仁奶露", emoji:"🥜"},
  {id:23, name:"陈皮青梅", emoji:"🫒"},
  {id:24, name:"姜乳茶", emoji:"🫚"},
  {id:25, name:"绿豆沙", emoji:"🟢"},
  {id:26, name:"鸭屎香轻乳茶", emoji:"🦆"}
];

const SB_URL = 'https://ihtlyzpusfsgpieeomhi.supabase.co';
const SB_KEY = 'sb_publishable_6Tu-LDqldC7AJMAjC0TXVQ_5gQql6Eu';
const SB_TABLE = 'summer_votes';

const TOTAL_VOTES = 3;
let remaining = TOTAL_VOTES;
const votes = {};           // {beverageId: count}
let submitted = false;

const grid = document.getElementById('beverageGrid');
const remainingEl = document.getElementById('remainingVotes');
const submitBtn = document.getElementById('submitBtn');
const overlay = document.getElementById('successOverlay');
const errorToast = document.getElementById('errorToast');

// === Render ===
function render(){
  grid.innerHTML = '';
  BEVERAGES.forEach(b => {
    const count = votes[b.id] || 0;
    const card = document.createElement('div');
    card.className = 'card' + (count > 0 ? ' card-voted' : '') + (remaining === 0 && count === 0 ? ' card-disabled' : '');
    card.dataset.id = b.id;

    const emojiSpan = document.createElement('span');
    emojiSpan.className = 'card-emoji';
    emojiSpan.textContent = b.emoji;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'card-name';
    nameSpan.textContent = b.name;

    const badge = document.createElement('div');
    badge.className = 'card-vote-badge' + (count > 0 ? ' visible' : '');

    // minus button (only if count > 0)
    if(count > 0){
      const minus = document.createElement('button');
      minus.className = 'card-minus';
      minus.textContent = '−';
      minus.setAttribute('aria-label','取消1票');
      minus.addEventListener('click', function(e){
        e.stopPropagation();
        removeVote(b.id);
      });
      badge.appendChild(minus);
    }

    const num = document.createElement('span');
    num.className = 'card-vote-badge-number';
    num.textContent = count > 0 ? count + ' 票' : '';
    badge.appendChild(num);

    card.appendChild(emojiSpan);
    card.appendChild(nameSpan);
    card.appendChild(badge);

    card.addEventListener('click', function(){
      handleCardClick(b.id);
    });

    grid.appendChild(card);
  });
  updateRemaining();
  updateSubmitBtn();
}

// === Vote Logic ===
function handleCardClick(id){
  if(submitted) return;
  const count = votes[id] || 0;

  if(remaining > 0){
    // Add vote
    votes[id] = (votes[id] || 0) + 1;
    remaining--;
    animateRemaining();
    render();
  } else if(count > 0){
    // No remaining votes, but this card has votes -> deduct mode
    removeVote(id);
  }
  // else: remaining === 0 and no votes on this card -> do nothing
}

function removeVote(id){
  if(submitted) return;
  const count = votes[id] || 0;
  if(count <= 0) return;
  votes[id] = count - 1;
  if(votes[id] === 0) delete votes[id];
  remaining++;
  animateRemaining();
  render();
}

function animateRemaining(){
  remainingEl.classList.remove('pop');
  // Force reflow
  void remainingEl.offsetWidth;
  remainingEl.classList.add('pop');
}

function updateRemaining(){
  remainingEl.textContent = remaining;
}

function updateSubmitBtn(){
  const hasVotes = Object.keys(votes).length > 0 && Object.values(votes).some(v => v > 0);
  submitBtn.disabled = !hasVotes;
}

// === Submission ===
submitBtn.addEventListener('click', submitVotes);

async function submitVotes(){
  if(submitted) return;
  const hasVotes = Object.values(votes).some(v => v > 0);
  if(!hasVotes) return;

  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';
  submitBtn.classList.add('submitting');

  const sessionId = crypto.randomUUID();
  const records = [];

  for(const id in votes){
    const count = votes[id];
    if(count > 0){
      const beverage = BEVERAGES.find(b => b.id === Number(id));
      if(!beverage) continue;
      for(let i = 0; i < count; i++){
        records.push({
          beverage_name: beverage.name,
          session_id: sessionId
        });
      }
    }
  }

  if(records.length === 0) return;

  try{
    const response = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`
      },
      body: JSON.stringify(records)
    });

    if(!response.ok){
      const errText = await response.text();
      throw new Error('HTTP ' + response.status + ': ' + errText);
    }

    submitted = true;
    showOverlay();
  }catch(err){
    console.error('Submit failed:', err);
    submitBtn.disabled = false;
    submitBtn.textContent = '提交投票';
    submitBtn.classList.remove('submitting');
    showError('提交失败，请检查网络后重试');
  }
}

// === Overlay ===
function showOverlay(){
  overlay.classList.add('active');
}

function closeOverlay(){
  overlay.classList.remove('active');
}

// === Toast ===
let errorTimer = null;
function showError(msg){
  errorToast.textContent = msg;
  errorToast.classList.add('active');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => {
    errorToast.classList.remove('active');
  }, 4000);
}

// === Init ===
render();
</script>
</body>
</html>
